name: Open dependencies PR

on:
  workflow_dispatch:
    inputs:
      version:
        type: string
        description: "New semantic version string"
        required: true

jobs:
  dep_pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.FPPF_BOT_AUTH_KEY }}

      - name: Permissions Check
        uses: Fusion-Power-Plant-Framework/fppf-actions/permission_check@deddef408d0061e542692a7bf97368449c5ee5b3
        with:
          token: ${{ secrets.FPPF_BOT_AUTH_KEY }}

      - name: Open develop_dependencies PR
        uses: ./.github/workflows/actions/dependencies_PR
        with:
          token: ${{ secrets.FPPF_BOT_AUTH_KEY }}
          tag: ${{ inputs.version }}
