name: Dependabot helper
on: pull_request

permissions:
  pull-requests: write
  issues: write
  repository-projects: write
  contents: write

jobs:
  dependency_changes:
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.head.repo.fork && github.repository == 'Fusion-Power-Plant-Framework/bluemira' }}
    outputs:
      changed: ${{ steps.check_pyproject_change.outputs.changed }}
    env:
      HEAD_REF: ${{ github.head_ref }}
    steps:
      - name: Fetch depth
        run: echo "PR_FETCH_DEPTH=$(( ${{ github.event.pull_request.commits }} + 1 ))" >> "${GITHUB_ENV}"
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ env.HEAD_REF }}
          fetch-depth: ${{ env.PR_FETCH_DEPTH }}
      - name: Skip dependency
        id: skip_check # if [skip dependency] in commit message, skip dependabot job
        run: |
          last_commit_message=$(git log -1 --pretty=%B)
          if echo "$last_commit_message" | grep -q "\[skip dependency\]"; then
            echo "should_skip=true" >> $GITHUB_OUTPUT
          else
            echo "should_skip=false" >> $GITHUB_OUTPUT
          fi
      - name: Check pyproject
        env:
          DEPENDABOT: ${{ github.event.pull_request.user.login == 'dependabot[bot]' }}
        id: check_pyproject_change
        if: steps.skip_check.outputs.should_skip == 'false'
        run: |
          hasdiff=$(git diff --quiet HEAD~$((${{ env.PR_FETCH_DEPTH }} - 1)) HEAD pyproject.toml && echo 0 || echo 1)
          if [ $DEPENDABOT == 'true' ] ; then
            hasdiff=1
          fi
          echo "changed=$hasdiff" >> "$GITHUB_OUTPUT"

  dependabot:
    runs-on: ubuntu-latest
    needs: [dependency_changes]
    env:
      HEAD_REF: ${{ github.head_ref }}
    if: needs.dependency_changes.outputs.changed == 1 && needs.dependency_changes.outputs.should_skip != 'true' # sanity check
    steps:
      - name: Dependabot metadata
        if: ${{ github.event.pull_request.user.login == 'dependabot[bot]' }}
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v2.4
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.DEPENDENCY_HELPER_TOKEN }}
          ref: ${{ env.HEAD_REF }}

      - name: Run uv
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv pip compile pyproject.toml --resolution=highest --python-version=3.11 --extra pinned -o requirements/uv/base.txt
          uv pip compile pyproject.toml --resolution=highest --python-version=3.11 --extra pinned -o requirements/uv/develop.txt --extra dev
          uv pip compile pyproject.toml --resolution=highest --python-version=3.11 --extra pinned -o requirements/uv/examples.txt --extra examples
          uv pip compile pyproject.toml --resolution=highest --python-version=3.11 --extra pinned -o requirements/uv/all.txt --extra dev --extra polyscope --extra examples

          # git
          git config user.email "49699333+dependabot[bot]@users.noreply.github.com"
          git config user.name "dependabot[bot]"
          git add requirements
          if [[ -n $(git status --porcelain) ]] ; then
            git commit -m "Updated dependencies in requirements files [skip dependency]"
            git push
          fi

      - name: Update pre-commit
        if: contains(steps.metadata.outputs.dependency-names, 'ruff')
        shell: bash
        run: |
          pip install pre-commit
          pre-commit autoupdate || true  # pre-commit hooks is not a file
          git add .pre-commit-config.yaml
          if [[ -n $(git status --porcelain) ]] ; then
            git commit -m "Updated pre-commit [skip dependency]"
            git push
          fi
          pre-commit run --all-files || true  # linter fixes returns non zero
          git add .
          if [[ -n $(git status --porcelain) ]] ; then
            git commit -m 'Linter fixes [skip dependency]'
            git push
          fi
